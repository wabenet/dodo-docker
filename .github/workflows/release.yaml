---
name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    container: "wabenet/wabe-project-build:v0.3.10"
    steps:
      - uses: wabenet/project-template/actions/build@v0.3.10
        with:
          release: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
